<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codyssey Docker Practice</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe6;
        --panel: #fffaf2;
        --ink: #1f2937;
        --accent: #c2410c;
        --line: #e5d3bd;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Pretendard", "Apple SD Gothic Neo", sans-serif;
        background:
          radial-gradient(circle at top, rgba(194, 65, 12, 0.14), transparent 34%),
          linear-gradient(180deg, #f8f3eb 0%, var(--bg) 100%);
        color: var(--ink);
      }

      main {
        max-width: 760px;
        margin: 72px auto;
        padding: 0 20px;
      }

      section {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 18px 40px rgba(31, 41, 55, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 1.05;
      }

      p {
        margin: 0 0 14px;
        font-size: 1.05rem;
        line-height: 1.7;
      }

      strong {
        color: var(--accent);
      }

      code {
        padding: 2px 8px;
        border-radius: 999px;
        background: #f6dfcc;
        color: #7c2d12;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <p>2026 Codyssey Pre-Session</p>
        <h1>Docker Custom Image Running</h1>
        <p>
          This page is served from a custom image built with
          <code>nginx:alpine</code>.
        </p>
        <p>
          If you can read this page through <strong>localhost</strong>, port
          mapping is working correctly.
        </p>
        <p>
          Change this file while using a bind mount to verify live reflection.
        </p>
      </section>
    </main>
  </body>
  </html>
